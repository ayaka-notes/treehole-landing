<style>
  :root {
    --bg0: #060b14;
    --bg1: #0b1322;
    --ink: #eef4ff;
    --muted: #8898b4;
    --faint: #5a6985;
    --line: rgba(255,255,255,0.08);
    --aqua: #46b8ff;
    --indigo: #7d8bff;
    --glass: rgba(255,255,255,0.035);
    --grad: linear-gradient(135deg, #46b8ff 0%, #6f7cff 100%);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Outfit", -apple-system, BlinkMacSystemFont, "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg0);
    color: var(--ink);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  .wrap { max-width: 940px; margin: 0 auto; padding: 0 22px; }

  /* ---- atmosphere ---- */
  .bg { position: fixed; inset: 0; z-index: -2; overflow: hidden; }
  .bg::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(720px 520px at 50% -8%, rgba(70,184,255,0.22), transparent 70%),
      radial-gradient(620px 620px at 88% 18%, rgba(125,139,255,0.16), transparent 70%),
      radial-gradient(800px 700px at 10% 92%, rgba(70,184,255,0.10), transparent 70%),
      linear-gradient(180deg, var(--bg1), var(--bg0) 60%);
  }
  .bubbles { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
  .bubble {
    position: absolute; bottom: -60px; border-radius: 50%;
    background: radial-gradient(circle at 32% 30%, rgba(255,255,255,0.35), rgba(70,184,255,0.06));
    border: 1px solid rgba(255,255,255,0.06);
    animation: rise linear infinite;
    opacity: 0;
  }
  @keyframes rise {
    0%   { transform: translateY(0) scale(0.7); opacity: 0; }
    12%  { opacity: 0.6; }
    88%  { opacity: 0.5; }
    100% { transform: translateY(-104vh) scale(1.1); opacity: 0; }
  }

  /* ---- header ---- */
  header {
    position: sticky; top: 0; z-index: 20;
    background: rgba(8,13,22,0.62);
    backdrop-filter: saturate(160%) blur(16px);
    border-bottom: 1px solid var(--line);
  }
  .nav { display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .brand { display: flex; align-items: center; gap: 11px; font-weight: 700; font-size: 16px; letter-spacing: .2px; }
  .brand img { width: 32px; height: 32px; border-radius: 9px; }
  .langbtn {
    border: 1px solid var(--line); background: var(--glass); color: var(--ink);
    border-radius: 999px; padding: 7px 16px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: .2s;
  }
  .langbtn:hover { border-color: var(--aqua); color: var(--aqua); }

  /* ---- hero ---- */
  .hero { text-align: center; padding: 90px 0 70px; }
  .halo { position: relative; display: inline-block; margin-bottom: 30px; }
  .halo::after {
    content: ""; position: absolute; inset: -38px; border-radius: 50%; z-index: -1;
    background: radial-gradient(circle, rgba(70,184,255,0.55), transparent 68%);
    filter: blur(14px);
  }
  .hero .logo {
    width: 104px; height: 104px; border-radius: 26px;
    box-shadow: 0 20px 50px rgba(70,184,255,0.32);
  }
  .hero h1 {
    font-size: clamp(34px, 6.4vw, 52px); font-weight: 800;
    letter-spacing: -1.2px; line-height: 1.12;
  }
  .hero h1 .accent {
    background: var(--grad); -webkit-background-clip: text;
    background-clip: text; color: transparent;
  }
  .hero .sub {
    color: var(--muted); font-size: clamp(15px, 2.4vw, 18px);
    margin-top: 16px; font-weight: 400;
  }
  .badges { display: flex; gap: 8px; justify-content: center; margin-top: 22px; flex-wrap: wrap; }
  .badge {
    font-size: 12px; color: var(--faint); border: 1px solid var(--line);
    border-radius: 999px; padding: 5px 13px; background: var(--glass);
  }

  /* ---- download ---- */
  .dls { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-top: 34px; }
  .dl {
    display: flex; align-items: center; gap: 13px;
    padding: 15px 26px; border-radius: 15px; min-width: 230px;
    transition: transform .18s, box-shadow .18s;
  }
  .dl svg { width: 24px; height: 24px; flex: none; }
  .dl .tx { text-align: left; line-height: 1.25; }
  .dl .tx .s { font-size: 11.5px; display: block; opacity: .82; font-weight: 400; }
  .dl .tx .b { font-size: 16.5px; font-weight: 700; }
  .dl.primary { background: var(--grad); color: #04203b; box-shadow: 0 12px 30px rgba(70,184,255,0.3); }
  .dl.ghost { background: var(--glass); color: var(--ink); border: 1px solid var(--line); }
  .dl:hover { transform: translateY(-3px); }
  .dl.primary:hover { box-shadow: 0 16px 38px rgba(70,184,255,0.42); }
  .dl.ghost:hover { border-color: var(--aqua); }
  .vhint { color: var(--faint); font-size: 12.5px; margin-top: 20px; }

  /* ---- sections ---- */
  section { padding: 70px 0; }
  .kick {
    text-align: center; font-size: 12.5px; font-weight: 700; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--aqua); margin-bottom: 10px;
  }
  h2 {
    font-size: clamp(25px, 4vw, 33px); font-weight: 800; text-align: center;
    letter-spacing: -.6px;
  }
  .lead { text-align: center; color: var(--muted); font-size: 14.5px; margin-top: 10px; }

  /* ---- features ---- */
  .grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 42px; }
  .card {
    background: var(--glass); border: 1px solid var(--line); border-radius: 18px;
    padding: 24px 22px; transition: transform .2s, border-color .2s, background .2s;
  }
  .card:hover { transform: translateY(-4px); border-color: rgba(70,184,255,0.4); background: rgba(70,184,255,0.05); }
  .card .ico {
    width: 44px; height: 44px; border-radius: 12px; display: flex;
    align-items: center; justify-content: center; margin-bottom: 14px;
    background: linear-gradient(135deg, rgba(70,184,255,0.18), rgba(125,139,255,0.18));
    border: 1px solid rgba(70,184,255,0.25);
  }
  .card .ico svg { width: 22px; height: 22px; stroke: var(--aqua); }
  .card h3 { font-size: 16.5px; font-weight: 700; margin-bottom: 5px; }
  .card p { color: var(--muted); font-size: 13.5px; }

  /* ---- install ---- */
  .tabs { display: flex; gap: 8px; justify-content: center; margin: 36px 0 28px; }
  .tab {
    border: 1px solid var(--line); background: var(--glass); color: var(--muted);
    border-radius: 999px; padding: 9px 22px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: .2s;
  }
  .tab.on { background: var(--grad); color: #04203b; border-color: transparent; }

  .steps { display: flex; flex-direction: column; gap: 12px; counter-reset: step; }
  .step {
    display: flex; gap: 18px; align-items: flex-start;
    background: var(--glass); border: 1px solid var(--line);
    border-radius: 16px; padding: 20px 22px; transition: border-color .2s;
  }
  .step:hover { border-color: rgba(70,184,255,0.32); }
  .step .num {
    flex: none; counter-increment: step; width: 34px; height: 34px;
    border-radius: 50%; background: var(--grad); color: #04203b;
    font-weight: 800; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
  }
  .step .num::before { content: counter(step); }
  .step h4 { font-size: 15.5px; font-weight: 700; margin-bottom: 2px; }
  .step p { color: var(--muted); font-size: 13.5px; }

  .note {
    margin-top: 20px; padding: 16px 18px; border-radius: 14px;
    background: rgba(70,184,255,0.07); border: 1px solid rgba(70,184,255,0.22);
    font-size: 13px; color: #b9d4ec;
  }
  .note b { color: var(--aqua); }

  /* ---- footer ---- */
  footer { border-top: 1px solid var(--line); padding: 40px 0 48px; text-align: center; }
  footer .flogo { width: 34px; height: 34px; border-radius: 9px; opacity: .85; margin-bottom: 12px; }
  footer p { color: var(--faint); font-size: 12.5px; }
  footer a.gh {
    display: inline-flex; align-items: center; gap: 7px; margin-top: 14px;
    color: var(--muted); font-size: 13px; border: 1px solid var(--line);
    padding: 8px 16px; border-radius: 999px; transition: .2s;
  }
  footer a.gh:hover { border-color: var(--aqua); color: var(--aqua); }
  footer a.gh svg { width: 16px; height: 16px; }

  /* ---- reveal ---- */
  .reveal { opacity: 0; transform: translateY(22px); transition: opacity .7s, transform .7s; }
  .reveal.in { opacity: 1; transform: none; }
  .hidden { display: none !important; }

  @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>

  function apply(lang) {
    var d = I18N[lang];
    document.documentElement.lang = lang === "zh" ? "zh" : "en";
    document.querySelectorAll("[data-i18n]").forEach(function (el) {
      var k = el.getAttribute("data-i18n");
      if (d[k]) el.textContent = d[k];
    });
    document.getElementById("langBtn").textContent = lang === "zh" ? "English" : "中文";
    try { localStorage.setItem("lang", lang); } catch (e) {}
  }
  var lang = "zh";
  try {
    var s = localStorage.getItem("lang");
    if (s) lang = s;
    else if ((navigator.language || "").toLowerCase().indexOf("zh") !== 0) lang = "en";
  } catch (e) {}
  apply(lang);
  document.getElementById("langBtn").onclick = function () {
    lang = lang === "zh" ? "en" : "zh"; apply(lang);
  };

  document.getElementById("dlAndroid").href = DL_APK;
  document.getElementById("dlIos").href = DL_IPA;
  document.getElementById("ghLink").href = REPO;

  var tabIos = document.getElementById("tabIos"), tabAndroid = document.getElementById("tabAndroid"),
    paneIos = document.getElementById("paneIos"), paneAndroid = document.getElementById("paneAndroid");
  tabIos.onclick = function () {
    tabIos.classList.add("on"); tabAndroid.classList.remove("on");
    paneIos.classList.remove("hidden"); paneAndroid.classList.add("hidden");
    revealAll();
  };
  tabAndroid.onclick = function () {
    tabAndroid.classList.add("on"); tabIos.classList.remove("on");
    paneAndroid.classList.remove("hidden"); paneIos.classList.add("hidden");
    revealAll();
  };

  // bubbles
  (function () {
    var host = document.getElementById("bubbles"), html = "";
    for (var i = 0; i < 9; i++) {
      var sz = 8 + Math.random() * 30, dur = 14 + Math.random() * 16,
        left = Math.random() * 100, delay = Math.random() * 18;
      html += '<span class="bubble" style="width:' + sz + 'px;height:' + sz +
        'px;left:' + left + '%;animation-duration:' + dur + 's;animation-delay:-' + delay + 's"></span>';
    }
    host.innerHTML = html;
  })();

  // hero load-in (staggered)
  document.querySelectorAll(".hero .reveal").forEach(function (el) {
    var dl = parseInt(el.getAttribute("data-delay") || "0", 10);
    el.style.transitionDelay = (dl * 0.09) + "s";
    requestAnimationFrame(function () { setTimeout(function () { el.classList.add("in"); }, 60); });
  });

  // scroll reveal
  var io = new IntersectionObserver(function (es) {
    es.forEach(function (e) {
      if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
    });
  }, { threshold: 0.12 });
  function revealAll() {
    document.querySelectorAll("section .reveal:not(.in)").forEach(function (el, i) {
      el.style.transitionDelay = (Math.min(i, 6) * 0.05) + "s";
      io.observe(el);
    });
  }
  revealAll();
</script>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>亦可赛艇 · treehole</title>
<meta name="description" content="亦可赛艇 treehole — 交大树洞移动客户端，下载与安装" />
<link rel="icon" href="./assets/logo.png" />
<style>
  :root {
    --indigo: #6366f1;
    --violet: #5b21b6;
    --ink: #1a202c;
    --muted: #6b7280;
    --bg: #ffffff;
    --soft: #f5f6fa;
    --border: #e5e7eb;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; }
  .wrap { max-width: 880px; margin: 0 auto; padding: 0 20px; }

  /* header */
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(255,255,255,0.85);
    backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav { display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; }
  .brand img { width: 30px; height: 30px; border-radius: 8px; }
  .langbtn {
    border: 1px solid var(--border); background: #fff; color: var(--ink);
    border-radius: 999px; padding: 6px 14px; font-size: 13px; cursor: pointer;
    font-weight: 600;
  }
  .langbtn:hover { border-color: var(--indigo); color: var(--indigo); }

  /* hero */
  .hero { text-align: center; padding: 64px 0 52px; }
  .hero .logo {
    width: 96px; height: 96px; border-radius: 22px; margin-bottom: 22px;
    box-shadow: 0 12px 32px rgba(99,102,241,0.28);
  }
  .hero h1 { font-size: 34px; letter-spacing: -0.5px; }
  .hero .sub { color: var(--muted); font-size: 16px; margin-top: 10px; }

  /* download buttons */
  .dls { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
  .dl {
    display: flex; align-items: center; gap: 12px; text-decoration: none;
    padding: 13px 22px; border-radius: 14px; min-width: 210px;
  }
  .dl .ic { font-size: 26px; line-height: 1; }
  .dl .tx { text-align: left; }
  .dl .tx .s { font-size: 11px; opacity: 0.8; display: block; }
  .dl .tx .b { font-size: 16px; font-weight: 700; }
  .dl.primary {
    background: linear-gradient(135deg, var(--indigo), var(--violet));
    color: #fff;
  }
  .dl.dark { background: var(--ink); color: #fff; }
  .dl:hover { transform: translateY(-2px); transition: transform .15s; }
  .vhint { color: var(--muted); font-size: 12px; margin-top: 16px; }

  /* sections */
  section { padding: 46px 0; }
  section.alt { background: var(--soft); }
  h2 { font-size: 23px; text-align: center; margin-bottom: 8px; }
  .lead { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 30px; }

  /* features */
  .grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
  .card {
    background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px;
  }
  .card .ci { font-size: 24px; }
  .card h3 { font-size: 16px; margin: 10px 0 4px; }
  .card p { color: var(--muted); font-size: 13.5px; }

  /* steps */
  .steps { counter-reset: step; display: flex; flex-direction: column; gap: 14px; }
  .step {
    background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 20px 18px 58px; position: relative;
  }
  .step::before {
    counter-increment: step; content: counter(step);
    position: absolute; left: 16px; top: 16px;
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--indigo), var(--violet));
    color: #fff; font-weight: 700; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .step h4 { font-size: 15px; margin-bottom: 3px; }
  .step p { color: var(--muted); font-size: 13.5px; }
  .step a { color: var(--indigo); font-weight: 600; }

  .tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 22px; }
  .tab {
    border: 1px solid var(--border); background: #fff; border-radius: 999px;
    padding: 7px 18px; font-size: 13.5px; font-weight: 600; cursor: pointer;
  }
  .tab.on { background: var(--indigo); color: #fff; border-color: var(--indigo); }

  .note {
    margin-top: 18px; padding: 14px 16px; border-radius: 12px;
    background: #fef9ec; border: 1px solid #f5e2b8; font-size: 13px; color: #7a5b12;
  }

  footer {
    border-top: 1px solid var(--border); padding: 28px 0;
    text-align: center; color: var(--muted); font-size: 12.5px;
  }
  footer a { color: var(--indigo); text-decoration: none; }

  .hidden { display: none !important; }
  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; }
    .hero h1 { font-size: 27px; }
  }
</style>
</head>
<body>

    </a>
    <a class="dl dark" id="dlIos" href="#">

      <span class="tx"><span class="s" data-i18n="dl.iosSmall"></span>
      <span class="b" data-i18n="dl.iosBig"></span></span>
    </a>
  </div>
  <p class="vhint" data-i18n="hero.hint"></p>
</div>

<!-- FEATURES -->
<section class="alt">
  <div class="wrap">
    <h2 data-i18n="feat.title"></h2>
    <p class="lead" data-i18n="feat.lead"></p>
    <div class="grid">
      <div class="card"><div class="ci">📰</div>
        <h3 data-i18n="feat.f1t"></h3><p data-i18n="feat.f1d"></p></div>
      <div class="card"><div class="ci">✍️</div>
        <h3 data-i18n="feat.f2t"></h3><p data-i18n="feat.f2d"></p></div>
      <div class="card"><div class="ci">🎭</div>
        <h3 data-i18n="feat.f3t"></h3><p data-i18n="feat.f3d"></p></div>
      <div class="card"><div class="ci">🔔</div>
        <h3 data-i18n="feat.f4t"></h3><p data-i18n="feat.f4d"></p></div>
      <div class="card"><div class="ci">🔍</div>
        <h3 data-i18n="feat.f5t"></h3><p data-i18n="feat.f5d"></p></div>
      <div class="card"><div class="ci">🌗</div>
        <h3 data-i18n="feat.f6t"></h3><p data-i18n="feat.f6d"></p></div>
    </div>
  </div>
</section>

<!-- INSTALL -->
<section>
  <div class="wrap">
    <h2 data-i18n="install.title"></h2>
    <p class="lead" data-i18n="install.lead"></p>

    <div class="tabs">
      <button class="tab on" id="tabIos" data-i18n="install.tabIos"></button>
      <button class="tab" id="tabAndroid" data-i18n="install.tabAndroid"></button>
    </div>

    <!-- iOS -->
    <div id="paneIos">
      <div class="steps">
        <div class="step"><h4 data-i18n="ios.s1t"></h4><p data-i18n="ios.s1d"></p></div>
        <div class="step"><h4 data-i18n="ios.s2t"></h4><p data-i18n="ios.s2d"></p></div>
        <div class="step"><h4 data-i18n="ios.s3t"></h4><p data-i18n="ios.s3d"></p></div>
        <div class="step"><h4 data-i18n="ios.s4t"></h4><p data-i18n="ios.s4d"></p></div>
        <div class="step"><h4 data-i18n="ios.s5t"></h4><p data-i18n="ios.s5d"></p></div>
        <div class="step"><h4 data-i18n="ios.s6t"></h4><p data-i18n="ios.s6d"></p></div>
        <div class="step"><h4 data-i18n="ios.s7t"></h4><p data-i18n="ios.s7d"></p></div>
      </div>
      <div class="note" data-i18n="ios.note"></div>
    </div>

    <!-- Android -->
    <div id="paneAndroid" class="hidden">
      <div class="steps">
        <div class="step"><h4 data-i18n="and.s1t"></h4><p data-i18n="and.s1d"></p></div>
        <div class="step"><h4 data-i18n="and.s2t"></h4><p data-i18n="and.s2d"></p></div>
        <div class="step"><h4 data-i18n="and.s3t"></h4><p data-i18n="and.s3d"></p></div>
      </div>
      <div class="note" data-i18n="and.note"></div>
    </div>
  </div>
</section>

<footer>
  <div class="wrap">
    <p data-i18n="footer.disc"></p>
    <p style="margin-top:6px">
      <a id="ghLink" href="#" target="_blank" rel="noopener">GitHub</a>
    </p>
  </div>
</footer>

  function apply(lang) {
    var dict = I18N[lang];
    document.documentElement.lang = lang === "zh" ? "zh" : "en";
    document.querySelectorAll("[data-i18n]").forEach(function (el) {
      var k = el.getAttribute("data-i18n");
      if (dict[k]) el.textContent = dict[k];
    });
    document.getElementById("langBtn").textContent = lang === "zh" ? "English" : "中文";
    try { localStorage.setItem("lang", lang); } catch (e) {}
  }

  var lang = "zh";
  try {
    var saved = localStorage.getItem("lang");
    if (saved) lang = saved;
    else if ((navigator.language || "").toLowerCase().indexOf("zh") !== 0) lang = "en";
  } catch (e) {}
  apply(lang);

  document.getElementById("langBtn").onclick = function () {
    lang = lang === "zh" ? "en" : "zh";
    apply(lang);
  };

  // download links
  document.getElementById("dlAndroid").href = RELEASES;
  document.getElementById("dlIos").href = RELEASES;
  document.getElementById("ghLink").href = REPO;

    tabAndroid = document.getElementById("tabAndroid"),
    paneIos = document.getElementById("paneIos"),
    paneAndroid = document.getElementById("paneAndroid");

    tabIos.classList.add("on"); tabAndroid.classList.remove("on");
    paneIos.classList.remove("hidden"); paneAndroid.classList.add("hidden");
  };
  tabAndroid.onclick = function () {
    tabAndroid.classList.add("on"); tabIos.classList.remove("on");
    paneAndroid.classList.remove("hidden"); paneIos.classList.add("hidden");
